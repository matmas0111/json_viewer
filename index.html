<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Viewer with Collapse</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <h1>JSON Viewer（折りたたみ版）</h1>
    <p>※ <a href="./diff_tool.html">Diff Viewerはこちら</a></p>

    <textarea id="input" placeholder="ここにJSONを貼り付けてください"></textarea>
    <button onclick="buildTree()">ツリーを表示</button>

    <div id="output" class="tree"></div>
  </div>

  <script>
    function buildTree() {
      const input = document.getElementById("input").value;
      const output = document.getElementById("output");
      output.innerHTML = '';

      let obj;
      try {
        obj = JSON.parse(input);
      } catch (e) {
        output.textContent = "JSONエラー: " + e.message;
        return;
      }

function createNode(key, value) {
  const node = document.createElement('div');
  node.className = 'node';

  // valueがオブジェクトまたは配列の場合
  if (value && typeof value === 'object') {
    const toggle = document.createElement('span');
    toggle.className = 'toggle';

    // nameがある場合はkeyの隣に表示
    let displayKey = key;
    if (Array.isArray(value)) {
      displayKey += ` [${value.length}]`; // 配列なら要素数も表示
    } else if (value.name) {
      displayKey += ` (${value.name})`;
    }

    toggle.textContent = '[+] ' + displayKey;

    const children = document.createElement('div');
    children.className = 'children';

    // 配列もオブジェクトも同じように再帰
    if (Array.isArray(value)) {
      value.forEach((item, index) => {
        children.appendChild(createNode(`[${index}]`, item));
      });
    } else {
      for (const k in value) {
        children.appendChild(createNode(k, value[k]));
      }
    }

    toggle.onclick = () => {
        const isOpen = children.classList.toggle('open');
        toggle.textContent = (isOpen ? '[-] ' : '[+] ') + displayKey; 
    };
    node.appendChild(toggle);
    node.appendChild(children);
  } else {
    // valueがプリミティブの場合
    node.textContent = key + ': ' + value;
  }

  return node;
}

      for (const k in obj) {
        output.appendChild(createNode(k, obj[k]));
      }
    }
  </script>
</body>
</html>
